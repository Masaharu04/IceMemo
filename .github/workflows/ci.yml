name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --no-tags

      - name: Install tools
        run: brew install swiftlint swift-format

      - name: Run SwiftLint
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}..HEAD -- '*.swift')
          if [ -z "$CHANGED" ]; then
            echo "No Swift files changed — skipping lint."
            exit 0
          fi
          echo "$CHANGED" | xargs swiftlint lint --strict

      - name: Run swift-format lint
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}..HEAD -- '*.swift')
          if [ -z "$CHANGED" ]; then
            echo "No Swift files changed — skipping format check."
            exit 0
          fi
          echo "$CHANGED" | xargs swift-format lint --strict

  build:
    name: Build
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build via Fastlane
        run: bundle exec fastlane ci_build_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
